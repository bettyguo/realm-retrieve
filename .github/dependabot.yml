version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    groups:
      lint-stack:
        patterns: ["black", "isort", "ruff", "mypy", "pre-commit"]
      test-stack:
        patterns: ["pytest*", "coverage"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    labels: ["ci"]
