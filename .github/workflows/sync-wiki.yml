name: Sync wiki

on:
  push:
    branches: [main]
    paths:
      - "docs/wiki/**"
      - "scripts/sync_wiki.sh"
      - ".github/workflows/sync-wiki.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-wiki
  cancel-in-progress: true

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Mirror docs/wiki/ → .wiki.git
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/sync_wiki.sh
          ./scripts/sync_wiki.sh
