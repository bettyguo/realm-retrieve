name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: ruff
        run: ruff check src tests
      - name: black --check
        run: black --check src tests
      - name: isort --check
        run: isort --check-only src tests

  typecheck:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e . --no-deps
      - name: mypy
        run: mypy src/realm_retrieve

  test:
    name: pytest (${{ matrix.os }} / py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install (light)
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch wheel to keep CI fast
          pip install --index-url https://download.pytorch.org/whl/cpu torch==2.2.0
          pip install -r requirements-dev.txt
          # Install package without heavy extras (no vLLM, no ColBERT, no faiss-gpu)
          pip install -e . --no-deps
          pip install numpy scipy scikit-learn pytrec-eval click jsonlines tqdm rich pyyaml omegaconf hydra-core
      - name: Run unit tests
        run: pytest -m "not slow and not gpu and not integration" --no-cov

  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install build
        run: pip install build twine
      - name: Build
        run: python -m build
      - name: twine check
        run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
