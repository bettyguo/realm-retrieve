# Hydra config for `make train-policy` (REINFORCE retrieval-intervention
# policy with curriculum-annealed cost coefficient λ₁: 0.5 → 0.1).

defaults:
  - _self_

seed: 0xRE4L

model:
  embedding_dim: 768
  hidden_dim: 512
  num_layers: 4
  num_heads: 8
  threshold: 0.65

data:
  train_path: data/processed/musique/train.jsonl
  val_path:   data/processed/musique/dev.jsonl

training:
  num_steps: 50000
  batch_size: 64
  learning_rate: 1.0e-4
  lambda1_start: 0.5
  lambda1_end:   0.1
  lambda2:       0.01
  entropy_coef:  0.01
  baseline_momentum: 0.95
  save_every: 5000
  checkpoint_dir: checkpoints/policy

logging:
  use_wandb: false
  log_level: INFO
